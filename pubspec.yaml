name: ux4g_flutter_design_system
description: "Flutter implementation of the UX4G design system components and foundations."
version: 0.4.1
homepage: https://github.com/ux4g-negd/ux4g-flutter-design-system
repository: https://github.com/ux4g-negd/ux4g-flutter-design-system
issue_tracker: https://github.com/ux4g-negd/ux4g-flutter-design-system/issues
documentation: https://ux4g-design.netlify.app/

environment:
  sdk: ^3.10.1
  flutter: ">=1.17.0"

dependencies:
  flutter:
    sdk: flutter
  camera: ^0.11.1
  google_mlkit_face_detection: ^0.12.0
  google_mlkit_commons: ^0.9.0
  permission_handler: ^11.4.0
  connectivity_plus: ^6.1.4
  flutter_svg: ^2.0.0
  image_picker: ^1.0.0
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:
  assets:
    - assets/icons/
    - assets/images/
